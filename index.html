<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <span class="theme-icon">🌙</span>
    </button>

    <main class="dashboard">
        <!-- Greeting Section -->
        <section id="greeting-container" class="greeting-section">
            <div class="time-display"></div>
            <div class="date-display"></div>
            <div class="greeting-message">
                <div class="greeting-wrapper">
                    <span id="greeting-text"></span>
                    <button id="edit-name-btn" class="edit-name-btn" aria-label="Edit name">✏️</button>
                </div>
            </div>
        </section>

        <!-- Timer Section -->
        <section id="timer-container" class="timer-section">
            <h2>Focus Timer</h2>
            <div class="timer-display">25:00</div>
            <div class="timer-progress-bar"><div class="timer-progress-fill" id="timer-progress-fill"></div></div>
            <div class="timer-presets">
                <button class="btn btn-preset" data-minutes="5">5m</button>
                <button class="btn btn-preset" data-minutes="15">15m</button>
                <button class="btn btn-preset active-preset" data-minutes="25">25m</button>
                <button class="btn btn-preset" data-minutes="60">1h</button>
            </div>
            <div class="timer-controls">
                <button id="timer-start" class="btn btn-start">Start</button>
                <button id="timer-stop" class="btn btn-stop">Stop</button>
                <button id="timer-reset" class="btn btn-reset">Reset</button>
            </div>
            <div class="timer-set-duration">
                <div class="timer-duration-fields">
                    <div class="timer-duration-field">
                        <input type="number" id="timer-hours-input" class="timer-duration-input" value="0" min="0" max="23" placeholder="0">
                        <span class="timer-duration-label">h</span>
                    </div>
                    <div class="timer-duration-field">
                        <input type="number" id="timer-minutes-input" class="timer-duration-input" value="25" min="0" max="59" placeholder="25">
                        <span class="timer-duration-label">m</span>
                    </div>
                    <div class="timer-duration-field">
                        <input type="number" id="timer-seconds-input" class="timer-duration-input" value="0" min="0" max="59" placeholder="0">
                        <span class="timer-duration-label">s</span>
                    </div>
                </div>
                <button id="timer-set-btn" class="btn btn-set">Set</button>
            </div>
            <p class="timer-hint">Press <kbd>Space</kbd> to start/stop</p>
        </section>

        <!-- Tasks Section -->
        <section id="tasks-container" class="tasks-section">
            <div class="tasks-header">
                <h2>To-Do List</h2>
                <span id="task-counter" class="task-counter"></span>
            </div>
            <form id="task-form" class="task-form">
                <input 
                    type="text" 
                    id="task-input" 
                    class="task-input" 
                    placeholder="Add a new task..." 
                    maxlength="500"
                    required
                >
                <button type="submit" class="btn btn-add">Add Task</button>
                <div class="char-counter" id="task-char-counter">0 / 500</div>
                <div class="validation-message" id="task-validation-message"></div>
            </form>
            <div id="task-list" class="task-list"></div>
            <div class="task-filters">
                <button class="btn-filter active-filter" data-filter="all">All</button>
                <button class="btn-filter" data-filter="active">Active</button>
                <button class="btn-filter" data-filter="done">Done</button>
            </div>
        </section>

        <!-- Quick Links Section -->
        <section id="links-container" class="links-section">
            <h2>Quick Links</h2>
            <form id="link-form" class="link-form">
                <input 
                    type="text" 
                    id="link-name-input" 
                    class="link-name-input" 
                    placeholder="Link name" 
                    maxlength="50"
                    required
                >
                <div class="char-counter" id="link-name-char-counter">0 / 50</div>
                <input 
                    type="text" 
                    id="link-url-input" 
                    class="link-url-input" 
                    placeholder="URL" 
                    required
                >
                <button type="submit" class="btn btn-add">Add Link</button>
                <div class="validation-message" id="link-validation-message"></div>
            </form>
            <div id="link-list" class="link-list"></div>
        </section>
    </main>

    <!-- Name Input Modal -->
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h3>What should I call you?</h3>
            <input 
                type="text" 
                id="name-input" 
                class="name-input" 
                placeholder="Enter your name" 
                maxlength="30"
            >
            <div class="modal-buttons">
                <button id="save-name-btn" class="btn btn-primary">Save</button>
                <button id="cancel-name-btn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
